<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <title>Lista de Tarefas</title>
</head>
<body>
    <main id="tasks">

        <div class="conteiner">

            <div class="topo">
                <h1>Lista de Tarefas</h1>
                <p>Organize sua rotina e ideias de forma eficiente.</p>
            </div>
            
            
            <div class="search-area">
                <form id="form">
                    <div>
                      <input 
                        type="text" 
                        id="pesquisa_tarefa"
                        class="search-box" 
                        placeholder="Pesquisar tarefa...">  
                    </div>
                    
                    
                    <div id="resultados">

                    </div>
                </form>
            </div>
            

            <div class="tarefas" id="cards">

            </div>

        </div>

    </main>

    <footer>
        <button class="btn-add" id="abrirModal" onclick="">+</button>
    </footer>
   
    <dialog id="modal">
        <button id="fecharModal">X</button>

        <h1>Adicionar Tarefa</h1>

        <div class="tarefa">
           <label for="">Tarefa: </label>
            <textarea class="pesquisa" name="task" id="task" maxlength="80" required></textarea> 
        </div>

        <div class="categoria">
            <label for="category">Categoria: </label>
            <div>
                <input type="radio" name="categoria" id="categoria" value="Urgente" required>
                Urgente
            </div>
            <div>
                <input type="radio" name="categoria" id="categoria" value="Requer Atenção" required> Requer Atenção
            </div>
            <div>
                <input type="radio" name="categoria" id="categoria" value="Qualquer momento" required> Qualquer momento
            </div>

            <button onclick="add_tarefa()" id="add_tarefa">Adicionar Tarefa</button>
        </div>

    </dialog>
    
    <dialog id="editarModal">
      <button id="fecharEditarModal">X</button>

        <h1>Editar Tarefa</h1>

        <div class="tarefa">
           <label for="edit_tarefa">Tarefa: </label>
            <textarea class="pesquisa" name="edit_task" id="edit_task" maxlength="80" required></textarea> 
        </div>

        <div class="categoria">
            <label for="category">Categoria: </label>
            <div>
                <input type="radio" name="edit_categoria" id="edit_categoria" value="Urgente" required>
                Urgente
            </div>
            <div>
                <input type="radio" name="edit_categoria" id="edit_categoria" value="Requer Atenção" required> Requer Atenção
            </div>
            <div>
                <input type="radio" name="edit_categoria" id="edit_categoria" value="Qualquer momento" required> Qualquer momento
            </div>

            <button onclick="editar_tarefa()" id="add_tarefa">Editar Tarefa</button>
        </div>

    </dialog>

    <script src="./js/index.js" defer></script>
</body>
</html>
