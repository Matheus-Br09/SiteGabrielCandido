<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/index.css">
    <title>Lista de Tarefas</title>
</head>
<body>
    <header>
        <h1>Bem-vindo a sua</h1>
        <h1 id="main_h1">Lista de Tarefas</h1>
    </header>
    <main>
        as tarefas vem aqui
    </main>

    <footer>
        <button class="btn-img" id="abrirModal" onclick=""><img src="../img/botao_Add.png" alt="botão de adicionar tarefa"></button>
    </footer>
    <dialog id="modal">
        <button id="fecharModal">X</button>

        <h1>Adicionar Tarefa</h1>

        <div class="tarefa">
           <label for="">Tarefa: </label>
            <input type="text" name="texto-tarefa" id="tarefa"> 
        </div>
        <div class="categoria">
            <label for="category">Categoria: </label>
            <div>
                <input type="radio" name="categoria" id="urgente" value="Urgente">
                Urgente
            </div>
            <div>
                <input type="radio" name="categoria" id="normal" value="Normal"> Normal
            </div>
            <div>
                <input type="radio" name="categoria" id="anyMoment" value="Qualquer momento"> Qualquer momento
            </div>
        </div>

    </dialog>

    <script src="../js/index.js"></script>
</body>
</html>
